# keyd config for dicti dictation.
#
# Many "AI assistant" / Copilot keys emit Super+Shift+F23 (Microsoft standard).
# This config remaps the F23 component to Super+Alt+F12. Original Super and Shift
# pass through unchanged, so the chord GNOME actually receives is:
# Super+Shift+Alt+F12. The GNOME custom shortcut binds that to dictate-toggle,
# and the daemon's state machine flips IDLE <-> LISTENING.
#
# NOTE on double-tap: keyd does NOT have a native tap-dance / double-tap
# primitive. Single-tap TOGGLE is used. If accidental presses become annoying,
# a small evdev helper requiring two presses within ~200ms could be added later.
#
# PANIC RECOVERY: hold Backspace+Escape+Enter simultaneously to kill keyd
# and restore the raw keyboard. Test this BEFORE relying on the config.
#
# To find the actual scancode for your key, run `sudo evtest` (or `wev` on
# Wayland), press the key, note the KEY_* name, and replace `f23` below.

[ids]
*

[main]
f23 = M-A-f12
